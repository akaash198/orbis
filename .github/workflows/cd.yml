name: CD

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-publish:
    name: Build & publish Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=tag
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Frontend image metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=tag
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: orbisporte-ui-master
          file: orbisporte-ui-master/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-hetzner:
    name: Deploy to Hetzner (docker compose)
    runs-on: ubuntu-latest
    needs: docker-publish
    if: ${{ (github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/v')) && secrets.HETZNER_HOST != '' && secrets.HETZNER_USER != '' && secrets.HETZNER_APP_DIR != '' && secrets.HETZNER_SSH_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        run: |
          scp docker-compose.prod.yml "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ secrets.HETZNER_APP_DIR }}/docker-compose.prod.yml"

      - name: Deploy (pull + up)
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          GHCR_REPO: ${{ github.repository }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "set -euo pipefail; \
             cd '${{ secrets.HETZNER_APP_DIR }}'; \
             export IMAGE_TAG='${IMAGE_TAG}'; \
             export GHCR_REPO='${GHCR_REPO}'; \
             if [ -n \"${GHCR_TOKEN}\" ] && [ -n \"${GHCR_USER}\" ]; then \
               echo \"${GHCR_TOKEN}\" | docker login ghcr.io -u \"${GHCR_USER}\" --password-stdin; \
             fi; \
             docker compose -f docker-compose.prod.yml pull; \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans; \
             docker image prune -f >/dev/null 2>&1 || true"
