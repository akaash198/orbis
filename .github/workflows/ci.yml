name: CI

on:
  pull_request:
  push:
    # Run on all branches (not just main/master)

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-syntax:
    name: Backend (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python files
        run: |
          python -m compileall backend/Orbisporte backend/*.py

  frontend-build:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orbisporte-ui-master
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orbisporte-ui-master/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          CI: "false"
        run: npm run build

  docker-build:
    name: Docker (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: orbisporte-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: orbisporte-ui-master
          file: orbisporte-ui-master/Dockerfile
          push: false
          tags: orbisporte-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
